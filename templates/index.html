<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI | Deteksi Link Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2C3947;    /* Navy Dark */
            --secondary: #547A95;  /* Muted Blue */
            --accent: #C2A56D;     /* Gold Accent */
            --light: #E8EDF2;      /* Off-White */
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--primary);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.03);
            padding: 50px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--accent);
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--secondary);
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 25px;
            background: rgba(232, 237, 242, 0.05);
            border: 1px solid var(--secondary);
            border-radius: 12px;
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            background: rgba(232, 237, 242, 0.08);
            box-shadow: 0 0 15px rgba(194, 165, 109, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.3s ease;
        }

        button:hover {
            background: #d4b882;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Result Section */
        #result-container {
            margin-top: 40px;
            display: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 16px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .phishing { background: #e74c3c; color: white; }
        .safe { background: #27ae60; color: white; }

        .confidence-label {
            font-size: 0.85rem;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .confidence-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .confidence-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 1s ease-in-out;
        }

        .explanation-box {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--light);
            border-left: 3px solid var(--accent);
            padding-left: 20px;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--secondary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PhishGuard AI</h1>
        <p>Analisis Link Keamanan Tingkat Lanjut dengan Machine Learning</p>
    </div>

    <div class="input-group">
        <input type="text" id="url-input" placeholder="Masukkan atau tempel URL di sini...">
    </div>
    
    <button onclick="analyzeUrl()" id="btn-text">Analisis Sekarang</button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 10px; font-size: 0.8rem; color: var(--secondary);">Mengekstrak fitur & menjalankan AI...</p>
    </div>

    <div id="result-container">
        <div class="result-card">
            <div id="status-badge" class="badge"></div>
            
            <div class="confidence-label">Confidence Prediksi: <span id="confidence-text">0%</span></div>
            <div class="confidence-bar">
                <div id="confidence-fill" class="confidence-fill"></div>
            </div>

            <div class="explanation-box">
                <strong style="display: block; margin-bottom: 8px; color: var(--accent);">Analisis AI (Penjelasan LLM):</strong>
                <p id="explanation-text">Menunggu data...</p>
            </div>
        </div>
    </div>
</div>

<script>
    async function analyzeUrl() {
        const urlInput = document.getElementById('url-input').value;
        const btn = document.querySelector('button');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('result-container');

        if (!urlInput) {
            alert("Harap masukkan URL");
            return;
        }

        // Tampilan Loading
        btn.style.display = 'none';
        loader.style.display = 'block';
        resultContainer.style.display = 'none';

        try {
            const response = await fetch('/api/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });

            const data = await response.json();

            // Sembunyikan Loading
            loader.style.display = 'none';
            btn.style.display = 'block';
            resultContainer.style.display = 'block';

            // Update UI
            const badge = document.getElementById('status-badge');
            if (data.is_phishing) {
                badge.innerText = "Terdeteksi Phishing";
                badge.className = "badge phishing";
            } else {
                badge.innerText = "Link Aman";
                badge.className = "badge safe";
            }

            document.getElementById('confidence-text').innerText = data.confidence + '%';
            document.getElementById('confidence-fill').style.width = data.confidence + '%';
            document.getElementById('explanation-text').innerText = data.explanation || "Analisis selesai berdasarkan pola fitur URL.";

        } catch (error) {
            alert("Gagal menghubungi server");
            loader.style.display = 'none';
            btn.style.display = 'block';
        }
    }
</script>

</body>
</html>
